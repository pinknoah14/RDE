name: Deploy to Lightsail

on:
  push:
    branches:
      - main
      - claude/**   # AI 작업 브랜치 자동 배포

jobs:
  deploy:
    name: 배포 및 검증
    runs-on: ubuntu-latest

    steps:
      - name: SSH 접속 후 배포 실행
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            echo "브랜치: $BRANCH"
            ~/RDE/deploy.sh "$BRANCH"

      - name: 헬스체크 (서버 내부에서 확인)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            echo "백엔드 헬스체크..."
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/dashboard)
              if [ "$STATUS" = "200" ]; then
                echo "✓ 백엔드 정상 (HTTP $STATUS)"
                break
              fi
              echo "재시도 $i/5 (HTTP $STATUS)..."
              sleep 5
            done
            if [ "$STATUS" != "200" ]; then
              echo "✗ 백엔드 헬스체크 실패"
              sudo journalctl -u rde-backend.service -n 30 --no-pager
              exit 1
            fi

            echo "프론트엔드 헬스체크..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
            if [ "$STATUS" = "200" ]; then
              echo "✓ 프론트엔드 정상 (HTTP $STATUS)"
            else
              echo "✗ 프론트엔드 헬스체크 실패 (HTTP $STATUS)"
              pm2 logs rde-frontend --lines 20 --nostream
              exit 1
            fi
