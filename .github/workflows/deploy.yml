name: Deploy to Lightsail

on:
  push:
    branches:
      - claude/**
  workflow_dispatch:
    inputs:
      branch:
        description: "배포할 브랜치"
        required: false
        default: "claude/review-design-docs-dzIPq"

jobs:
  deploy:
    name: 배포 및 검증
    runs-on: ubuntu-latest

    steps:
      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: 배포 실행
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
            "cd ~/RDE && git fetch origin && git checkout '$BRANCH' && git pull origin '$BRANCH' && bash deploy.sh '$BRANCH'"

      - name: 헬스체크
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} << 'EOF'
            echo "백엔드 헬스체크..."
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/dashboard)
              if [ "$STATUS" = "200" ]; then
                echo "✓ 백엔드 정상 (HTTP $STATUS)"
                break
              fi
              echo "재시도 $i/5 (HTTP $STATUS)..."
              sleep 5
            done
            [ "$STATUS" = "200" ] || { echo "✗ 백엔드 헬스체크 실패"; exit 1; }

            echo "프론트엔드 헬스체크..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
            [ "$STATUS" = "200" ] && echo "✓ 프론트엔드 정상" || { echo "✗ 프론트엔드 실패 (HTTP $STATUS)"; exit 1; }
          EOF
