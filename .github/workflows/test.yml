name: Phase 1 검증

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: replenish-system/backend/requirements.txt

      - name: 의존성 설치
        run: |
          cd replenish-system/backend
          pip install -r requirements.txt

      - name: data 폴더 생성
        run: mkdir -p replenish-system/backend/data

      - name: pytest 실행
        run: |
          cd replenish-system/backend
          pytest tests/ -v --tb=short \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_wave_integration.py \
            --ignore=tests/test_performance.py \
            --ignore=tests/test_scenarios.py \
            --ignore=tests/test_slack_mock.py
        env:
          PYTHONPATH: .

      - name: 테스트 결과 요약
        if: always()
        run: |
          cd replenish-system/backend
          pytest tests/ --tb=no -q \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_wave_integration.py \
            --ignore=tests/test_performance.py \
            --ignore=tests/test_scenarios.py \
            --ignore=tests/test_slack_mock.py
        env:
          PYTHONPATH: .
